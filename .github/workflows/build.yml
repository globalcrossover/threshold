name: Build Threshold

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build-mac-legacy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Electron 13 for legacy Mac
        run: npm install electron@13 --save-dev
      - name: Inject Brave API key
        run: sed -i '' 's|BRAVE_KEY_PLACEHOLDER|${{ secrets.BRAVE_API_KEY }}|g' main.js
      - name: Build Mac Legacy
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename legacy builds
        run: |
          cd dist
          for f in *.dmg; do mv "$f" "${f%.dmg}-legacy.dmg"; done
      - name: Upload legacy Mac build
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*-legacy.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac-modern:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Inject Brave API key
        run: sed -i '' 's|BRAVE_KEY_PLACEHOLDER|${{ secrets.BRAVE_API_KEY }}|g' main.js
      - name: Build Mac Modern
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload modern Mac build
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Inject Brave API key
        run: sed -i 's|BRAVE_KEY_PLACEHOLDER|${{ secrets.BRAVE_API_KEY }}|g' main.js
      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Inject Brave API key
        run: sed -i 's|BRAVE_KEY_PLACEHOLDER|${{ secrets.BRAVE_API_KEY }}|g' main.js
      - name: Build Linux
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
